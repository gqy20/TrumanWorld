[build]
builder = "RAILPACK"
buildCommand = "cd frontend && npm ci && npm run build"
watchPatterns = [
  "/frontend/**",
]

[deploy]
startCommand = "cd frontend && npm run start -- --hostname 0.0.0.0 --port ${PORT:-3000}"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
